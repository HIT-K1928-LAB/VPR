# ----------------------------------------------------------------------------
# Variance-aware OT-GaussVLAD training config
# ----------------------------------------------------------------------------

datamodule:
  train_set_name: "gsv-cities"
  train_image_size:
    - 280
    - 280
  img_per_place: 4
  batch_size: 40
  num_workers: 8
  val_set_names:
    - "msls-val"
    - "pitts30k-val"

backbone:
  module: src.models.backbones
  class: DinoV2
  params:
    backbone_name: "dinov2_vitb14"
    num_unfrozen_blocks: 2
    return_cls_token: false

aggregator:
  module: src.models.aggregators.variance_aware_ot_gaussvlad
  class: VarianceAwareOTGaussVLADDiagCovLayer
  params:
    in_channels: 768
    num_clusters: 64
    cluster_dim: 64
    hidden_channels: 768
    descriptor_dim: 8192
    include_pi_in_scores: false
    sinkhorn_iters: 3
    dustbin_mass: 0.05
    dropout: 0.0
    mass_preserving: true
    mass_power: 1.0
    token_mass_mode: learned_uncertainty
    token_mass_hidden_channels: 64
    sigma_cost_weight: 1.0
    learn_sigma_cost_weight: true
    score_scale_init: 10.0
    token_log_sigma_bias: 0.0
    token_log_sigma_scale: 2.0
    residual_mode: normalized
    eps: 1e-6

loss_function:
  module: src.losses
  class: VPRLossFunction
  params:
    loss_fn_name: "MultiSimilarityLoss"
    miner_name: "MultiSimilarityMiner"

trainer:
  optimizer: adamw
  lr: 0.0001
  wd: 0.001
  warmup: 1500
  max_epochs: 40
  milestones:
    - 10
    - 20
    - 30
  lr_mult: 0.1
