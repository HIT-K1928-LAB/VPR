# ----------------------------------------------------------------------------
# OT-GaussVLAD + Distribution-aware Gaussian Cross-query Similarity
# ----------------------------------------------------------------------------

datamodule:
  train_set_name: "gsv-cities"
  cities: "all"
  train_image_size:
    - 280
    - 280
  val_image_size:
    - 322
    - 322
  img_per_place: 4
  batch_size: 40
  num_workers: 8
  val_set_names:
    - "msls-val"
    - "pitts30k-val"

backbone:
  module: src.models.backbones
  class: DinoV2
  params:
    backbone_name: "dinov2_vitb14"
    num_unfrozen_blocks: 2
    return_cls_token: false

aggregator:
  module: src.models.aggregators.ot_gaussvlad_gaussian_cs
  class: OTGaussVLADGaussianCSLayer
  params:
    in_channels: 768
    num_clusters: 64
    cluster_dim: 64
    hidden_channels: 768
    score_mode: gmm
    include_pi_in_scores: false
    sinkhorn_iters: 3
    dustbin_mass: 0.05
    dropout: 0.0
    mass_preserving: true
    mass_power: 1.0
    token_mass_mode: learned
    token_mass_hidden_channels: 64

    # Distribution-aware CS branch. Defaults align the Gaussian-CS matrix
    # [Cr=128, Cf=64] with the OT residual shape [K=64, 2D=128].
    gcs_num_queries: 128
    gcs_feature_dim: 64
    gcs_reference_dim: 128
    gcs_feature_nheads: 8
    gcs_reference_nheads: 8
    gcs_self_attn: true
    gcs_attn_dropout: 0.0
    gcs_metric: w2
    gcs_reduce: mean
    gcs_intra_norm: true
    gcs_score_scale_init: 1.0
    gcs_sigma_weight_init: 1.0
    gcs_learn_sigma_weight: true
    gcs_natural_normalize: true
    gcs_hybrid_natural_init: 0.5
    gcs_log_sigma_bias: 0.0
    gcs_log_sigma_scale: 2.0

    # Initializes as OT + 0.1 * Gaussian-CS per cluster.
    fusion_mode: residual_gated
    fusion_dropout: 0.0
    gcs_fusion_init: 0.3
    eps: 1e-6

loss_function:
  module: src.losses
  class: VPRLossFunction
  params:
    loss_fn_name: "MultiSimilarityLoss"
    miner_name: "MultiSimilarityMiner"

trainer:
  optimizer: adamw
  lr: 0.0001
  wd: 0.001
  warmup: 1500
  max_epochs: 40
  milestones:
    - 10
    - 20
    - 30
  lr_mult: 0.1
