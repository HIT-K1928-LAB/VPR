# ----------------------------------------------------------------------------
# Pure Laplace OT-VLAD training config
# ----------------------------------------------------------------------------

datamodule:
  train_set_name: "gsv-cities"
  train_image_size:
    - 280
    - 280
  img_per_place: 4
  batch_size: 20
  num_workers: 8
  val_set_names:
    - "msls-val"
    - "pitts30k-val"

backbone:
  module: src.models.backbones
  class: DinoV2
  params:
    backbone_name: "dinov2_vitb14"
    num_unfrozen_blocks: 2
    return_cls_token: false

aggregator:
  module: src.models.aggregators.laplace_ot_vlad
  class: LaplaceOTVLADLayer
  params:
    in_channels: 768
    num_clusters: 64
    cluster_dim: 64
    hidden_channels: 768
    descriptor_dim: 8192
    include_pi_in_scores: false
    include_laplace_normalizer: true
    normalize_cost_by_dim: true
    sinkhorn_iters: 3
    dustbin_mass: 0.05
    dropout: 0.0
    mass_preserving: true
    mass_power: 1.0
    token_mass_mode: learned
    token_mass_hidden_channels: 64
    residual_mode: score
    score_scale_init: 1.0
    smooth_abs_eps: 1e-3
    eps: 1e-6

loss_function:
  module: src.losses
  class: VPRLossFunction
  params:
    loss_fn_name: "MultiSimilarityLoss"
    miner_name: "MultiSimilarityMiner"

trainer:
  optimizer: adamw
  lr: 0.0001
  wd: 0.001
  warmup: 1500
  max_epochs: 40
  milestones:
    - 10
    - 20
    - 30
  lr_mult: 0.1
