# ----------------------------------------------------------------------------
# OT-GaussVLAD + self-attentive Gaussian codebook + OT-anchored estimate refine
# ----------------------------------------------------------------------------

datamodule:
  train_set_name: "gsv-cities"
  train_set_names:
    - "gsv-cities"
    - "msls"
    - "SF_XL"
  train_dataset_weights:
    gsv-cities: 1.0
    msls: 1.0
    SF_XL: 1.0
  train_loader_mode: "max_size_cycle"
  msls_sampling:
    sample_mode: "clique"
    bucket_size_m: 25.0
    cluster_radius_m: 20.0
    min_images_per_place: 4
  sf_xl_sampling:
    sample_mode: "clique"
    bucket_size_m: 25.0
    cluster_radius_m: 20.0
    min_images_per_place: 4
  generic_sampling:
    sample_mode: "clique"
    bucket_size_m: 25.0
    cluster_radius_m: 20.0
    min_images_per_place: 4
  cities: "all"
  train_image_size:
    - 280
    - 280
  val_image_size:
    - 322
    - 322
  img_per_place: 4
  batch_size: 40
  num_workers: 8
  val_set_names:
    - "msls-val"
    - "pitts30k-val"

backbone:
  module: src.models.backbones
  class: DinoV2
  params:
    backbone_name: "dinov2_vitb14"
    num_unfrozen_blocks: 2
    return_cls_token: false

aggregator:
  module: src.models.aggregators.ot_gaussvlad_gaussian_query_codebook_ot_anchored_refine
  class: OTGaussVLADGaussianQueryCodebookOTAnchoredRefineLayer
  params:
    in_channels: 768
    num_clusters: 64
    cluster_dim: 64
    hidden_channels: 768
    score_mode: gmm
    include_pi_in_scores: false
    sinkhorn_iters: 3
    dustbin_mass: 0.05
    dropout: 0.0
    mass_preserving: true
    mass_power: 0.05
    token_mass_mode: learned
    token_mass_hidden_channels: 64
    gaussian_query_dim: 64
    gaussian_query_nheads: 8
    gaussian_self_attn: true
    gaussian_attn_dropout: 0.0
    gaussian_mu_scale_init: 0.05
    gaussian_sigma_scale_init: 0.05
    gaussian_max_residual_scale: 1.0
    gaussian_residual_tanh: true
    estimate_refine_dim: 64
    estimate_refine_nheads: 4
    estimate_refine_dropout: 0.0
    estimate_refine_mlp_ratio: 2.0
    estimate_refine_use_ffn: true
    estimate_refine_delta_tanh: true
    estimate_refine_mu_scale_init: 0.05
    estimate_refine_sigma_scale_init: 0.05
    estimate_refine_max_residual_scale: 1.0
    eps: 1e-6

loss_function:
  module: src.losses
  class: VPRLossFunction
  params:
    loss_fn_name: "MultiSimilarityLoss"
    miner_name: "MultiSimilarityMiner"

trainer:
  optimizer: adamw
  lr: 0.0001
  wd: 0.001
  warmup: 3900
  max_epochs: 40
  milestones:
    - 10
    - 20
    - 30
  lr_mult: 0.1
  accelerator: gpu
  devices: 1
  strategy: null
  num_nodes: 1
